name: Fetch news, build and deploy to GitHub Pages

on:
  schedule:
    # 每小时第 5 分钟触发一次（错峰避免整点拥堵）
    - cron: '5 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'site/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news (RSS -> data/latest.json)
        run: python scripts/fetch_news.py

      - name: Commit updated data back to repo
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: auto update news data [skip ci]"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site (Astro)
        working-directory: site
        env:
          # 项目页部署到 https://<user>.github.io/<repo>/，需要设置 base
          BASE_PATH: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
