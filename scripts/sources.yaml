# 抓取行为配置
settings:
  timeout_seconds: 15
  user_agent: "Mozilla/5.0 (compatible; NewsBot/1.0; +https://github.com/)"
  max_items_per_source: 30
  # 数据保留：latest.json 保留最近 N 小时内的条目，避免文件无限增长
  retain_hours: 168   # 7 天
